name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inbox
          POSTGRES_PASSWORD: inbox
          POSTGRES_DB: inbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inbox -d inbox_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The test suite's globalSetup migrates + seeds this DB. No ANTHROPIC_API_KEY
      # is needed — the agent SDK is mocked in the unit tests and never called.
      DATABASE_URL: postgresql://inbox:inbox@localhost:5432/inbox_test?schema=public

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
